<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#FAFAF8;--bg2:#F2F1ED;--bg3:#E8E6E0;--card:#FFFFFF;
--text:#1A1916;--text2:#5A584F;--text3:#9A9890;
--accent:#C84B31;--accent2:#E8622A;
--border:#E0DDD6;--border2:#C8C5BE;
--shadow:rgba(0,0,0,0.06);
--font:'Be Vietnam Pro',sans-serif;
--radius:12px;--radius-sm:8px;
}
[data-theme="dark"]{
--bg:#16150F;--bg2:#1E1D16;--bg3:#28271E;--card:#1E1D16;
--text:#F0EEE8;--text2:#A8A69E;--text3:#66645C;
--accent:#E8622A;--accent2:#F07840;
--border:#2E2D24;--border2:#3E3D34;
--shadow:rgba(0,0,0,0.3);
}
body{
font-family:var(--font);background:var(--bg);color:var(--text);
min-height:100vh;transition:background .3s,color .3s;
}
.app{max-width:900px;margin:0 auto;padding:2rem 1.5rem 4rem;}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{
width:38px;height:38px;background:var(--accent);border-radius:10px;
display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0;
}
.logo-text{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);}
.logo-sub{font-size:11px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-top:1px;}
.header-actions{display:flex;align-items:center;gap:8px;}

.btn-icon{
width:36px;height:36px;border:1px solid var(--border);border-radius:var(--radius-sm);
background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;
color:var(--text2);font-size:16px;transition:all .2s;
}
.btn-icon:hover{border-color:var(--border2);background:var(--bg2);color:var(--text);}
.btn-icon.active{background:var(--accent);border-color:var(--accent);color:#fff;}

.lang-toggle{
display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);
border-radius:var(--radius-sm);overflow:hidden;
}
.lang-btn{
padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;
border:none;background:transparent;color:var(--text2);font-family:var(--font);transition:all .2s;
}
.lang-btn.active{background:var(--accent);color:#fff;}

.upload-zone{
border:2px dashed var(--border2);border-radius:var(--radius);
background:var(--bg2);padding:3.5rem 2rem;text-align:center;
cursor:pointer;transition:all .3s;position:relative;overflow:hidden;
}
.upload-zone:hover{border-color:var(--accent);background:var(--bg3);}
.upload-zone.drag{border-color:var(--accent);background:var(--bg3);border-style:solid;}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:48px;color:var(--text3);margin-bottom:1rem;display:block;}
.upload-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:0.4rem;}
.upload-sub{font-size:13px;color:var(--text3);}
.upload-hint{
display:inline-flex;align-items:center;gap:6px;margin-top:1rem;
font-size:12px;color:var(--text3);background:var(--bg3);
padding:5px 12px;border-radius:20px;border:1px solid var(--border);
}

.preview-section{display:none;}
.preview-section.show{display:block;}

.preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.section-title{font-size:14px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;}
.btn-reset{
display:flex;align-items:center;gap:6px;padding:7px 14px;
border:1px solid var(--border);border-radius:var(--radius-sm);
background:transparent;cursor:pointer;font-size:13px;color:var(--text2);
font-family:var(--font);transition:all .2s;
}
.btn-reset:hover{background:var(--bg2);border-color:var(--border2);color:var(--text);}

.preview-img{
width:100%;max-height:380px;object-fit:cover;border-radius:var(--radius);
border:1px solid var(--border);display:block;
}

.controls{display:flex;align-items:center;justify-content:space-between;margin:1.25rem 0;}
.count-control{display:flex;align-items:center;gap:10px;}
.count-label{font-size:13px;color:var(--text2);}
.count-btns{display:flex;align-items:center;gap:4px;}
.cnt-btn{
width:28px;height:28px;border:1px solid var(--border);border-radius:6px;
background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;
color:var(--text2);font-size:14px;transition:all .2s;
}
.cnt-btn:hover{background:var(--bg2);border-color:var(--border2);}
.count-val{font-size:15px;font-weight:600;min-width:24px;text-align:center;color:var(--text);}

.format-tabs{display:flex;gap:4px;background:var(--bg2);padding:3px;border-radius:var(--radius-sm);}
.fmt-tab{
padding:5px 12px;border-radius:6px;border:none;background:transparent;
font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);
color:var(--text2);transition:all .2s;
}
.fmt-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px var(--shadow);}

.extract-btn{
width:100%;padding:13px;border:none;border-radius:var(--radius);
background:var(--accent);color:#fff;font-size:15px;font-weight:600;
cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;
gap:8px;transition:all .2s;margin:1rem 0;
}
.extract-btn:hover{background:var(--accent2);transform:translateY(-1px);}
.extract-btn:active{transform:translateY(0);}
.extract-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.spinner{
width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);
border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none;
}
.extract-btn.loading .spinner{display:block;}
.extract-btn.loading .btn-label{display:none;}
@keyframes spin{to{transform:rotate(360deg)}}

.palette-section{display:none;}
.palette-section.show{display:block;}

.palette-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin:1rem 0;}
.color-card{
background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
overflow:hidden;cursor:pointer;transition:all .2s;
}
.color-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 6px 20px var(--shadow);}
.color-swatch{height:90px;position:relative;}
.color-copy-hint{
position:absolute;inset:0;background:rgba(0,0,0,0.35);
display:flex;align-items:center;justify-content:center;
color:#fff;font-size:12px;opacity:0;transition:opacity .2s;
}
.color-card:hover .color-copy-hint{opacity:1;}
.color-info{padding:10px;}
.color-value{font-size:13px;font-weight:600;color:var(--text);letter-spacing:0.02em;}
.color-name{font-size:11px;color:var(--text3);margin-top:2px;}

.palette-strip{
display:flex;border-radius:var(--radius);overflow:hidden;
height:64px;border:1px solid var(--border);margin:1.25rem 0;cursor:pointer;
}
.strip-color{flex:1;position:relative;transition:flex .3s;}
.strip-color:hover{flex:1.5;}
.strip-tooltip{
position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
background:rgba(0,0,0,0.75);color:#fff;font-size:11px;padding:3px 7px;
border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;
}
.strip-color:hover .strip-tooltip{opacity:1;}

.export-bar{display:flex;gap:8px;margin-top:1.25rem;flex-wrap:wrap;}
.btn-export{
display:flex;align-items:center;gap:6px;padding:8px 16px;
border:1px solid var(--border);border-radius:var(--radius-sm);
background:var(--card);cursor:pointer;font-size:13px;font-weight:500;
color:var(--text2);font-family:var(--font);transition:all .2s;
}
.btn-export:hover{background:var(--bg2);border-color:var(--accent);color:var(--accent);}

.toast{
position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
background:var(--text);color:var(--bg);padding:10px 20px;border-radius:30px;
font-size:13px;font-weight:500;opacity:0;transition:all .35s;z-index:1000;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.color-names-en = {
  "red":"Red","orange":"Orange","yellow":"Yellow","green":"Green",
  "blue":"Blue","purple":"Purple","pink":"Pink","brown":"Brown",
  "gray":"Gray","black":"Black","white":"White","cyan":"Cyan","teal":"Teal",
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-palette"></i></div>
      <div>
        <div class="logo-text">Palette Extractor</div>
        <div class="logo-sub" id="logo-sub">Trích xuất bảng màu từ ảnh</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="lang-toggle">
        <button class="lang-btn active" id="btn-vi" onclick="setLang('vi')">VI</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
      </div>
      <button class="btn-icon" id="themeBtn" onclick="cycleTheme()" title="Đổi giao diện"><i class="ti ti-sun" id="themeIcon"></i></button>
    </div>
  </div>

  <div id="uploadZone" class="upload-zone" ondragover="onDrag(event,true)" ondragleave="onDrag(event,false)" ondrop="onDrop(event)">
    <input type="file" accept="image/*" id="fileInput" onchange="onFile(event)">
    <i class="ti ti-photo-up upload-icon"></i>
    <div class="upload-title" id="t-upload-title">Tải ảnh lên để bắt đầu</div>
    <div class="upload-sub" id="t-upload-sub">Kéo thả hoặc nhấn để chọn ảnh</div>
    <div class="upload-hint">
      <i class="ti ti-photo" style="font-size:12px"></i>
      <span id="t-upload-hint">JPG, PNG, WEBP, GIF · Tối đa 20MB</span>
    </div>
  </div>

  <div class="preview-section" id="previewSection">
    <div class="preview-header">
      <span class="section-title" id="t-preview-label">Ảnh đã chọn</span>
      <button class="btn-reset" onclick="resetApp()">
        <i class="ti ti-refresh"></i><span id="t-reset">Chọn ảnh khác</span>
      </button>
    </div>
    <img id="previewImg" class="preview-img" alt="Preview">

    <div class="controls">
      <div class="count-control">
        <span class="count-label" id="t-count-label">Số màu:</span>
        <div class="count-btns">
          <button class="cnt-btn" onclick="changeCount(-1)"><i class="ti ti-minus"></i></button>
          <span class="count-val" id="colorCountVal">6</span>
          <button class="cnt-btn" onclick="changeCount(1)"><i class="ti ti-plus"></i></button>
        </div>
      </div>
      <div class="format-tabs">
        <button class="fmt-tab active" onclick="setFormat('hex',this)">HEX</button>
        <button class="fmt-tab" onclick="setFormat('rgb',this)">RGB</button>
        <button class="fmt-tab" onclick="setFormat('hsl',this)">HSL</button>
      </div>
    </div>

    <button class="extract-btn" id="extractBtn" onclick="extractPalette()">
      <div class="spinner"></div>
      <span class="btn-label"><i class="ti ti-sparkles"></i> <span id="t-extract-btn">Trích xuất bảng màu</span></span>
    </button>
  </div>

  <div class="palette-section" id="paletteSection">
    <div class="preview-header">
      <span class="section-title" id="t-palette-label">Bảng màu</span>
      <div style="display:flex;gap:6px">
        <button class="btn-reset" onclick="extractPalette()">
          <i class="ti ti-refresh"></i><span id="t-re-extract">Tạo lại</span>
        </button>
      </div>
    </div>

    <div class="palette-strip" id="paletteStrip"></div>
    <div class="palette-grid" id="paletteGrid"></div>

    <div class="export-bar">
      <button class="btn-export" onclick="exportCSS()">
        <i class="ti ti-code"></i><span id="t-exp-css">CSS Variables</span>
      </button>
      <button class="btn-export" onclick="exportJSON()">
        <i class="ti ti-file-code"></i><span id="t-exp-json">JSON</span>
      </button>
      <button class="btn-export" onclick="exportText()">
        <i class="ti ti-copy"></i><span id="t-exp-copy">Sao chép tất cả</span>
      </button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<canvas id="canvas" style="display:none"></canvas>

<script>
const i18n={
  vi:{
    'logo-sub':'Trích xuất bảng màu từ ảnh',
    'upload-title':'Tải ảnh lên để bắt đầu',
    'upload-sub':'Kéo thả hoặc nhấn để chọn ảnh',
    'upload-hint':'JPG, PNG, WEBP, GIF · Tối đa 20MB',
    'preview-label':'Ảnh đã chọn',
    'reset':'Chọn ảnh khác',
    'count-label':'Số màu:',
    'extract-btn':'Trích xuất bảng màu',
    'palette-label':'Bảng màu',
    're-extract':'Tạo lại',
    'exp-css':'CSS Variables',
    'exp-json':'JSON',
    'exp-copy':'Sao chép tất cả',
    'copied':'Đã sao chép!',
    'exported':'Đã sao chép vào clipboard',
    'copy-hint':'Nhấn để sao chép',
    'extracting':'Đang phân tích...',
    'drop-hint':'Thả ảnh vào đây'
  },
  en:{
    'logo-sub':'Extract color palettes from images',
    'upload-title':'Upload an image to get started',
    'upload-sub':'Drag & drop or click to select',
    'upload-hint':'JPG, PNG, WEBP, GIF · Max 20MB',
    'preview-label':'Selected image',
    'reset':'Choose another',
    'count-label':'Colors:',
    'extract-btn':'Extract palette',
    'palette-label':'Color palette',
    're-extract':'Regenerate',
    'exp-css':'CSS Variables',
    'exp-json':'JSON',
    'exp-copy':'Copy all',
    'copied':'Copied!',
    'exported':'Copied to clipboard',
    'copy-hint':'Click to copy',
    'extracting':'Analyzing...',
    'drop-hint':'Drop image here'
  }
};

let lang='vi', theme='system', colorFormat='hex', colorCount=6;
let extractedColors=[], currentImg=null;

function t(k){return i18n[lang][k]||k;}
function setLang(l){
  lang=l;
  document.getElementById('btn-vi').classList.toggle('active',l==='vi');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  updateTexts();
  savePrefs();
}
function updateTexts(){
  const keys=['logo-sub','upload-title','upload-sub','upload-hint','preview-label','reset',
    'count-label','extract-btn','palette-label','re-extract','exp-css','exp-json','exp-copy'];
  keys.forEach(k=>{
    const el=document.getElementById('t-'+k);
    if(el)el.textContent=t(k);
  });
}

const THEMES=['system','light','dark'];
const ICONS={'light':'ti-sun','dark':'ti-moon','system':'ti-device-desktop'};
function cycleTheme(){
  const idx=THEMES.indexOf(theme);
  theme=THEMES[(idx+1)%3];
  applyTheme();savePrefs();
}
function applyTheme(){
  const icon=document.getElementById('themeIcon');
  icon.className='ti '+ICONS[theme];
  if(theme==='system'){
    const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  } else {
    document.documentElement.setAttribute('data-theme',theme);
  }
}

function savePrefs(){
  try{localStorage.setItem('ipe_prefs',JSON.stringify({lang,theme,colorFormat,colorCount}));}catch(e){}
}
function loadPrefs(){
  try{
    const p=JSON.parse(localStorage.getItem('ipe_prefs')||'{}');
    if(p.lang)lang=p.lang;
    if(p.theme)theme=p.theme;
    if(p.colorFormat)colorFormat=p.colorFormat;
    if(p.colorCount)colorCount=p.colorCount;
  }catch(e){}
}

function onDrag(e,entering){
  e.preventDefault();
  document.getElementById('uploadZone').classList.toggle('drag',entering);
}
function onDrop(e){
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/'))loadImage(f);
}
function onFile(e){
  const f=e.target.files[0];
  if(f)loadImage(f);
}
function loadImage(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=document.getElementById('previewImg');
    img.src=ev.target.result;
    currentImg=ev.target.result;
    document.getElementById('uploadZone').style.display='none';
    document.getElementById('previewSection').classList.add('show');
    document.getElementById('paletteSection').classList.remove('show');
    extractedColors=[];
  };
  reader.readAsDataURL(file);
}
function resetApp(){
  document.getElementById('uploadZone').style.display='';
  document.getElementById('previewSection').classList.remove('show');
  document.getElementById('paletteSection').classList.remove('show');
  document.getElementById('fileInput').value='';
  currentImg=null;extractedColors=[];
}
function changeCount(d){
  colorCount=Math.max(2,Math.min(12,colorCount+d));
  document.getElementById('colorCountVal').textContent=colorCount;
  savePrefs();
}
function setFormat(f,btn){
  colorFormat=f;
  document.querySelectorAll('.fmt-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(extractedColors.length)renderPalette();
  savePrefs();
}

function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0;}else{
    const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);
    switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}
    h/=6;
  }
  return `hsl(${Math.round(h*360)},${Math.round(s*100)}%,${Math.round(l*100)}%)`;
}
function formatColor(r,g,b){
  if(colorFormat==='hex')return rgbToHex(r,g,b);
  if(colorFormat==='rgb')return `rgb(${r},${g},${b})`;
  return rgbToHsl(r,g,b);
}

function getColorName(r,g,b){
  const h=rgbToHsl(r,g,b);
  const hm=h.match(/hsl\((\d+),(\d+)%,(\d+)%\)/);
  if(!hm)return '';
  const hv=+hm[1],s=+hm[2],l=+hm[3];
  if(s<12){
    if(l<15)return lang==='vi'?'Đen':'Black';
    if(l>85)return lang==='vi'?'Trắng':'White';
    return lang==='vi'?'Xám':'Gray';
  }
  const names_vi=['Đỏ','Cam','Vàng','Xanh lá','Xanh lam','Tím','Hồng'];
  const names_en=['Red','Orange','Yellow','Green','Blue','Purple','Pink'];
  const ranges=[[0,20],[20,40],[40,80],[80,160],[160,250],[250,310],[310,360]];
  for(let i=0;i<ranges.length;i++){
    if(hv>=ranges[i][0]&&hv<ranges[i][1])return lang==='vi'?names_vi[i]:names_en[i];
  }
  return lang==='vi'?'Hồng':'Pink';
}

function quantizeColors(pixels, k){
  const sample=[];
  const step=Math.max(1,Math.floor(pixels.length/(k*800)));
  for(let i=0;i<pixels.length;i+=step*4){
    if(pixels[i+3]>128)sample.push([pixels[i],pixels[i+1],pixels[i+2]]);
  }
  if(!sample.length)return Array(k).fill([128,128,128]);
  let centers=[];
  const step2=Math.floor(sample.length/k);
  for(let i=0;i<k;i++)centers.push([...sample[i*step2]]);

  for(let iter=0;iter<20;iter++){
    const clusters=Array.from({length:k},()=>({sum:[0,0,0],cnt:0}));
    for(const px of sample){
      let best=0,bd=Infinity;
      for(let j=0;j<k;j++){
        const d=(px[0]-centers[j][0])**2+(px[1]-centers[j][1])**2+(px[2]-centers[j][2])**2;
        if(d<bd){bd=d;best=j;}
      }
      clusters[best].sum[0]+=px[0];clusters[best].sum[1]+=px[1];clusters[best].sum[2]+=px[2];
      clusters[best].cnt++;
    }
    let moved=false;
    for(let j=0;j<k;j++){
      if(clusters[j].cnt>0){
        const nc=[
          Math.round(clusters[j].sum[0]/clusters[j].cnt),
          Math.round(clusters[j].sum[1]/clusters[j].cnt),
          Math.round(clusters[j].sum[2]/clusters[j].cnt)
        ];
        if(nc.some((v,i)=>v!==centers[j][i])){centers[j]=nc;moved=true;}
      }
    }
    if(!moved)break;
  }
  return centers.sort((a,b)=>{
    const la=0.299*a[0]+0.587*a[1]+0.114*a[2];
    const lb=0.299*b[0]+0.587*b[1]+0.114*b[2];
    return lb-la;
  });
}

function extractPalette(){
  if(!currentImg)return;
  const btn=document.getElementById('extractBtn');
  btn.disabled=true;btn.classList.add('loading');
  btn.querySelector('#t-extract-btn').textContent=t('extracting');
  
  setTimeout(()=>{
    const canvas=document.getElementById('canvas');
    const img=new Image();
    img.onload=()=>{
      const maxW=300;
      const scale=Math.min(1,maxW/img.width);
      canvas.width=Math.round(img.width*scale);
      canvas.height=Math.round(img.height*scale);
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;
      extractedColors=quantizeColors(data,colorCount);
      renderPalette();
      btn.disabled=false;btn.classList.remove('loading');
      btn.querySelector('#t-extract-btn').textContent=t('extract-btn');
    };
    img.src=currentImg;
  },50);
}

function renderPalette(){
  document.getElementById('paletteSection').classList.add('show');
  const grid=document.getElementById('paletteGrid');
  const strip=document.getElementById('paletteStrip');
  grid.innerHTML='';strip.innerHTML='';
  
  extractedColors.forEach(([r,g,b])=>{
    const val=formatColor(r,g,b);
    const hex=rgbToHex(r,g,b);
    const name=getColorName(r,g,b);
    
    const card=document.createElement('div');
    card.className='color-card';
    card.innerHTML=`
      <div class="color-swatch" style="background:${hex}">
        <div class="color-copy-hint"><i class="ti ti-copy" style="font-size:14px;margin-right:4px"></i>${t('copy-hint')}</div>
      </div>
      <div class="color-info">
        <div class="color-value">${val}</div>
        <div class="color-name">${name}</div>
      </div>`;
    card.onclick=()=>copyText(val);
    grid.appendChild(card);

    const seg=document.createElement('div');
    seg.className='strip-color';
    seg.style.background=hex;
    seg.innerHTML=`<div class="strip-tooltip">${hex}</div>`;
    seg.onclick=()=>copyText(hex);
    strip.appendChild(seg);
  });
}

function copyText(text){
  navigator.clipboard.writeText(text).then(()=>showToast(t('copied')));
}
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

function exportCSS(){
  const lines=extractedColors.map(([r,g,b],i)=>`  --color-${i+1}: ${rgbToHex(r,g,b)};`);
  copyText(`:root {\n${lines.join('\n')}\n}`);
  showToast(t('exported'));
}
function exportJSON(){
  const obj=extractedColors.map(([r,g,b],i)=>({
    id:i+1,hex:rgbToHex(r,g,b),
    rgb:{r,g,b},
    hsl:rgbToHsl(r,g,b)
  }));
  copyText(JSON.stringify(obj,null,2));
  showToast(t('exported'));
}
function exportText(){
  const lines=extractedColors.map(([r,g,b])=>formatColor(r,g,b));
  copyText(lines.join('\n'));
  showToast(t('exported'));
}

loadPrefs();
document.getElementById('colorCountVal').textContent=colorCount;
document.querySelectorAll('.fmt-tab').forEach(b=>{
  if(b.textContent===colorFormat.toUpperCase())b.classList.add('active');
  else b.classList.remove('active');
});
setLang(lang);
applyTheme();
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{
  if(theme==='system')applyTheme();
});
</script>
</body>
