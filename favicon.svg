<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  <!-- One UI 8 style: squircle background -->
  <rect width="512" height="512" rx="116" ry="116" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="116" ry="116" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Color palette dots in 2x2 grid — vivid, distinct hues -->
  <!-- Top-left: Red -->
  <circle cx="170" cy="170" r="72" fill="#FF5252" opacity="0.95"/>
  <!-- Top-right: Amber -->
  <circle cx="342" cy="170" r="72" fill="#FFD740" opacity="0.95"/>
  <!-- Bottom-left: Teal/Green -->
  <circle cx="170" cy="342" r="72" fill="#69F0AE" opacity="0.95"/>
  <!-- Bottom-right: Cyan -->
  <circle cx="342" cy="342" r="72" fill="#40C4FF" opacity="0.95"/>
  <!-- Center blend circle for depth -->
  <circle cx="256" cy="256" r="28" fill="rgba(255,255,255,0.18)"/>
</svg>
